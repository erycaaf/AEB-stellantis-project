##############################################################################
# nginx — Unified AEB Dashboard
#
# Serves everything on port 80 (mapped to :3000 on host):
#   /              → static dashboard HTML/JS/CSS
#   /novnc/        → Gazebo 3D via noVNC (proxied from :6080)
#   /api/          → scenario control REST API (proxied from :8000)
##############################################################################

server {
    listen 80;
    server_name localhost;

    # ── Static dashboard files ────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── noVNC proxy (Gazebo 3D) ───────────────────────────────────────────
    location /novnc/ {
        proxy_pass http://gazebo:6080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ── Scenario control API ──────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
