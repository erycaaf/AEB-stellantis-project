# AEB Zephyr Application
# Target: native_sim with TCP CAN bus via POSIX sockets + pthread

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# POSIX threading support (for CAN RX pthread)
CONFIG_PTHREAD_IPC=y

# Enable floating point in log/printf (needed for LOG_INF with %f)
CONFIG_CBPRINTF_FP_SUPPORT=y
