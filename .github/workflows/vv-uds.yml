name: UDS V&V

# Runs the ASIL-D V&V stack scoped to the UDS module.
#
# Triggers only on paths that can affect UDS behaviour. On PRs to
# development/main, the blocking gates (MC/DC, memory safety, MISRA) must
# pass; fault-uds is intentionally non-blocking until the three
# robustness bugs documented in reports/vv_uds/fault_injection/run.log
# are patched on fix/uds-robustness. After that PR lands, flip
# `continue-on-error` on the fault-injection step to `false`.
#
# Reports are published in two layers:
#   1. Workflow Artifacts on every run (PR or push), retention 30 days.
#   2. GitHub Pages (gh-pages branch) on push to development/main —
#      navigable HTML reports under
#      https://erycaaf.github.io/AEB-stellantis-project/vv_uds/<branch>/.

on:
  pull_request:
    branches: [development, main]
    paths:
      - 'src/communication/aeb_uds.c'
      - 'include/aeb_uds.h'
      - 'include/aeb_types.h'
      - 'include/aeb_config.h'
      - 'tests/test_uds.c'
      - 'tests/test_uds_fault.c'
      - 'Makefile'
      - 'scripts/wrap_memory.sh'
      - 'scripts/wrap_fault.py'
      - 'docker/Dockerfile.vv'
      - '.github/workflows/vv-uds.yml'
  push:
    branches: [development, main]
    paths:
      - 'src/communication/aeb_uds.c'
      - 'include/aeb_uds.h'
      - 'include/aeb_types.h'
      - 'include/aeb_config.h'
      - 'tests/test_uds.c'
      - 'tests/test_uds_fault.c'
      - 'Makefile'
      - 'scripts/wrap_memory.sh'
      - 'scripts/wrap_fault.py'
      - 'docker/Dockerfile.vv'
      - '.github/workflows/vv-uds.yml'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: vv-uds-${{ github.ref }}
  cancel-in-progress: false

jobs:
  vv-uds:
    name: UDS V&V stack
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install V&V toolchain (matches docker/Dockerfile.vv)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 make libc6-dev \
            cppcheck python3-pygments \
            valgrind lcov gcovr python3-minimal bc
          sudo ln -sf /usr/bin/gcc-14  /usr/local/bin/gcc
          sudo ln -sf /usr/bin/g++-14  /usr/local/bin/g++
          sudo ln -sf /usr/bin/gcov-14 /usr/local/bin/gcov
          # cppcheck-htmlreport is no longer packaged on Ubuntu 24.04 — fetch
          # the upstream script pinned to the tag matching the apt-installed
          # cppcheck version (docker/Dockerfile.vv documents cppcheck 2.13).
          sudo curl -fsSL \
            https://raw.githubusercontent.com/danmar/cppcheck/2.13.0/htmlreport/cppcheck-htmlreport \
            -o /usr/local/bin/cppcheck-htmlreport
          sudo chmod +x /usr/local/bin/cppcheck-htmlreport
          gcc --version | head -1
          gcov --version | head -1
          cppcheck --version
          cppcheck-htmlreport --help | head -1
          valgrind --version

      # ─── Blocking gate 1: structural coverage ─────────────────────────────
      - name: MC/DC coverage (gate ≥ 95%)
        run: |
          make mcdc-uds
          SUM="reports/vv_uds/coverage_mcdc/gcov_summary.txt"
          STMT=$(grep '^Lines executed:'             "$SUM" | head -1 | sed 's/.*:\([0-9.]*\)%.*/\1/')
          BRCH=$(grep '^Branches executed:'          "$SUM" | head -1 | sed 's/.*:\([0-9.]*\)%.*/\1/')
          MCDC=$(grep '^Condition outcomes covered:' "$SUM"          | sed 's/.*:\([0-9.]*\)%.*/\1/')
          echo "UDS coverage — stmt=${STMT}% branch=${BRCH}% mcdc=${MCDC}%"
          for metric in "Statement:$STMT" "Branch:$BRCH" "MC/DC:$MCDC"; do
            name="${metric%%:*}"; value="${metric##*:}"
            if [ "$(echo "$value < 95.0" | bc -l)" = "1" ]; then
              echo "::error title=UDS coverage regression::${name} dropped to ${value}% (required ≥95%)"
              exit 1
            fi
          done

      # ─── Blocking gate 2: dynamic memory safety on nominal suite ──────────
      - name: Memory safety (Valgrind + ASan + UBSan)
        run: |
          make memory-uds
          MS="reports/vv_uds/memory_safety"
          # Valgrind/ASan on the *nominal* suite must be silent.
          # Logs from the *fault* suite can contain expected UBSan reports
          # (aeb_uds.c:82, :103) until the fix/uds-robustness PR lands —
          # those are the evidence for Bug #1, not a regression.
          if [ -s "$MS/valgrind_test_uds.log" ]; then
            echo "::error title=Valgrind regression::Errors on nominal UDS suite"
            cat "$MS/valgrind_test_uds.log"; exit 1
          fi
          if [ -s "$MS/ubsan_test_uds.log" ]; then
            echo "::error title=UBSan regression::Errors on nominal UDS suite"
            cat "$MS/ubsan_test_uds.log"; exit 1
          fi

      # ─── Blocking gate 3: MISRA C:2012 (UDS scope only) ───────────────────
      # Counts only findings emitted by the MISRA addon (id prefix
      # "misra-c2012"), not cppcheck-native style/portability/unused
      # warnings. Those are still generated into the XML for context but
      # don't fail the gate.
      - name: MISRA (0 issues in aeb_uds.{c,h})
        run: |
          make misra-uds
          UDS_ISSUES=$(python3 - <<'PY'
          import xml.etree.ElementTree as ET
          t = ET.parse("reports/vv_uds/misra/cppcheck_uds.xml")
          target = ("src/communication/aeb_uds.c", "include/aeb_uds.h")
          n = 0
          for e in t.findall(".//error"):
              if not e.get("id", "").startswith("misra-c2012"):
                  continue
              loc = e.find("location")
              if loc is not None and loc.get("file", "") in target:
                  n += 1
          print(n)
          PY
          )
          echo "MISRA issues in aeb_uds scope: $UDS_ISSUES"
          if [ "$UDS_ISSUES" != "0" ]; then
            echo "::error title=MISRA regression::$UDS_ISSUES issue(s) in aeb_uds.{c,h}"
            exit 1
          fi

      # ─── Non-blocking (reports-only) until fix/uds-robustness lands ───────
      # Flip `continue-on-error` to `false` after fix/uds-robustness merges.
      - name: Fault injection (non-blocking until bugs patched)
        continue-on-error: true
        run: make fault-uds

      # ─── Generate navigable HTML reports ──────────────────────────────────
      - name: Generate HTML reports
        if: always()
        run: make html-uds

      # ─── Summary for the PR/commit checks UI ──────────────────────────────
      - name: Step summary
        if: always()
        run: |
          {
            echo "## UDS V&V — run #${{ github.run_number }}"
            echo ""
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "📊 **Browse reports:** https://erycaaf.github.io/AEB-stellantis-project/vv_uds/${{ github.ref_name }}/"
              echo ""
            fi
            echo "### Structural coverage"
            echo '```'
            cat reports/vv_uds/coverage_mcdc/gcov_summary.txt
            echo '```'
            echo ""
            echo "### Fault injection"
            echo '```'
            tail -5 reports/vv_uds/fault_injection/run.log
            echo '```'
            echo ""
            echo "### Memory safety"
            for f in reports/vv_uds/memory_safety/*.log; do
              name=$(basename "$f")
              if [ -s "$f" ]; then
                echo "**${name}:**"
                echo '```'
                head -20 "$f"
                echo '```'
              else
                echo "**${name}:** _clean_"
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vv-uds-reports-run${{ github.run_number }}
          path: reports/vv_uds/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────
  # Publish HTML reports to GitHub Pages on push to development/main only.
  # Each module workflow publishes its own subdirectory under vv_<module>/
  # on the gh-pages branch; keep_files: true preserves the others.
  # ───────────────────────────────────────────────────────────────────────
  publish-pages:
    needs: vv-uds
    if: github.event_name == 'push' && (github.ref == 'refs/heads/development' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    # Serialise every gh-pages push across ALL workflows in the repo
    # (vv-uds, vv-<other>, publish-index, ...) to avoid non-fast-forward
    # races. Shared string, no ref suffix.
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          name: vv-uds-reports-run${{ github.run_number }}
          path: site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: vv_uds/${{ github.ref_name }}
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: '41898282+github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs(vv-uds): publish reports from run #${{ github.run_number }} (${{ github.ref_name }})'
